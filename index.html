<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Musical Bingo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{text-align:center;padding:40px 24px;}
h1{font-size:36px;font-weight:700;margin-bottom:12px;letter-spacing:1px;}
p{font-size:15px;color:rgba(255,255,255,0.4);margin-bottom:48px;}
.btn-grid{display:flex;flex-direction:column;gap:16px;max-width:300px;margin:0 auto;}
a{display:block;padding:20px;border-radius:16px;font-size:17px;font-weight:600;text-decoration:none;transition:opacity 0.15s;}
a:active{opacity:0.8;}
.host-btn{background:#534AB7;color:#fff;}
.player-btn{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.15);}
.label{font-size:11px;opacity:0.6;margin-top:4px;font-weight:400;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Musical Bingo</h1>
  <p>Choose your role for tonight</p>
  <div class="btn-grid">
    <a href="/host.html" class="host-btn">
      Host dashboard
      <div class="label">For the DJ / event organiser</div>
    </a>
    <a href="/player.html" class="player-btn">
      Join as a player
      <div class="label">For guests with a bingo card</div>
    </a>
  </div>
</div>
</body>
</html>
